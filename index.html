<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tentativa de evitar cache -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>Teste de Atualização</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #111827, #2563eb, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: white;
    }

    .app {
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 28px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      line-height: 1.5;
      opacity: 0.9;
      margin-bottom: 25px;
    }

    button {
      width: 100%;
      padding: 17px;
      border: none;
      border-radius: 16px;
      background: #facc15;
      color: #111827;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(250, 204, 21, 0.35);
    }

    button:active {
      transform: scale(0.97);
    }

    #mensagem {
      display: none;
      margin-top: 24px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(34, 197, 94, 0.25);
      border: 1px solid rgba(34, 197, 94, 0.7);
      color: #ffffff;
      font-size: 21px;
      font-weight: bold;
    }

    .info {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.25);
      font-size: 13px;
      opacity: 0.8;
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <main class="app">
    <div class="badge">VERSÃO 5.0</div>

    <h1>Teste de Atualização</h1>

    <p>
      Esta versão foi criada para testar se o app no Kodular está carregando a versão nova do GitHub.
    </p>

    <button id="botaoTeste">Clique para testar</button>

    <div id="mensagem">
      uhuuuuuu, a versão nova carregou!
    </div>

    <div class="info">
      Se você está vendo a versão 5.0, o sistema de atualização funcionou.
    </div>
  </main>

  <script>
    const botao = document.getElementById("botaoTeste");
    const mensagem = document.getElementById("mensagem");

    botao.addEventListener("click", function () {
      mensagem.style.display = "block";
    });

    // Tenta remover caches antigos, se existirem
    if ("caches" in window) {
      caches.keys().then(function (nomes) {
        nomes.forEach(function (nome) {
          caches.delete(nome);
        });
      });
    }

    // Tenta remover service workers antigos, se existirem
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registros) {
        registros.forEach(function (registro) {
          registro.unregister();
        });
      });
    }
  </script>

</body>
</html>
