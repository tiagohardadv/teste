<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Teste</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #001f3f, #00c6ff);
      color: white;
    }

    .app {
      width: 90%;
      max-width: 380px;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 24px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    h1 {
      font-size: 26px;
      margin-bottom: 25px;
      color: #ffffff;
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: #ff9800;
      color: #1b1b1b;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:active {
      transform: scale(0.96);
      background: #ffc107;
    }

    #mensagem {
      margin-top: 25px;
      font-size: 22px;
      font-weight: bold;
      color: #ffff00;
      display: none;
    }
  </style>
</head>

<body>

  <div class="app">
    <h1>Meu App</h1>

    <button onclick="mostrarMensagem()">teste</button>

    <div id="mensagem">uhuuuuuu, funciona mesmo</div>
  </div>

  <script>
    function mostrarMensagem() {
      document.getElementById("mensagem").style.display = "block";
    }
  </script>

</body>
</html>
